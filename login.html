<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
          body {
        margin: 0;
        font-family: "Georgia", serif;
        background-color: #e6fff5;

      .banner {
        background-color:#e6fff5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 30px;
      }

      .left {
        display: flex;
        align-items: center;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin-right: 20px;
      }

      .title {
        color: #0a7a3d;
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .subtitle {
        color: #c40000;
        font-size: 22px;
        font-weight: bold;
        margin-top: 5px;
      }

      .right {
        color: #c40000;
        font-size: 16px;
        font-weight: bold;
      }
      .navbarlist {
        gap: 70px;
        margin-left: auto;
      }
      .admition_open{
        text-align: center;
        font-size: 50px;
      }
      .form{
        width: 700px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <!-- banner -->
    <div class="banner">
      <div class="left">
        <!-- logo  -->

        <img src="https://scontent.fbbi2-2.fna.fbcdn.net/v/t39.30808-6/668898591_986245787227764_2109894966157444276_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=13d280&_nc_ohc=ECEJVs_JgYUQ7kNvwGKq2zv&_nc_oc=AdreYG8mwNfT3k7hONZaInKQQTqekD-UgJi6jGGK4pUMjEjJxcQ9v2pcICmRqVaY3kmw_Fjl44bVSXBvElwoLwX3&_nc_zt=23&_nc_ht=scontent.fbbi2-2.fna&_nc_gid=tgY6LeuUdopfqsDg9uSv3g&_nc_ss=7a3a8&oh=00_Af251oYM8NbqeYWU2VEU9ejpvgTFQUc7uIQEIvga53LBdQ&oe=69DD3B4C" alt="School Logo" class="logo" />

        <div>
          <div class="title">NUA ODISHA SKILL CENTER</div>
          <div class="subtitle">
            23 Years - A Legacy of Educational Brilliance
          </div>
        </div>
      </div>

      <div class="right"> </div>
    </div>

    <!--form  -->

    <form class="form">
      <div class="admition_open">
      <span>Admison Open</span></a>
      </div>

      <div class="conteiner-fluid mx-5">
        <div class="form-group">
    

        <label for="exampleInputEmail1">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          aria-describedby="emailHelp"
        />
        <small id="emailHelp" class="form-text text-muted"
          >We'll never share your email with anyone else.</small
        >
      </div>
      <div class="form-group">
        <label for="exampleInputPassword1">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
        />
      </div>
      <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1" />
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
      </div>
     
        <button type="submit" class="btn btn-primary">Submit</button>
   
      
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
